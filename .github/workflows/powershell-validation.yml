name: PowerShell Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'PowerShell Script/**'
      - 'tests/**'
      - 'tools/**'
      - '.github/workflows/powershell-validation.yml'
      - 'AGENTS.md'
      - 'SKILL.md'
      - 'docs/**'
  pull_request:
    paths:
      - 'PowerShell Script/**'
      - 'tests/**'
      - 'tools/**'
      - '.github/workflows/powershell-validation.yml'
      - 'AGENTS.md'
      - 'SKILL.md'
      - 'docs/**'

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test and analyzer modules
        shell: pwsh
        run: |
          Install-Module Pester -Repository PSGallery -Scope CurrentUser -RequiredVersion 5.7.1 -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Repository PSGallery -Scope CurrentUser -RequiredVersion 1.25.0 -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\Invoke-PSScriptAnalyzer.ps1 `
            -Path . `
            -Recurse `
            -SettingsPath .\tools\PSScriptAnalyzerSettings.psd1 `
            -EnableExit `
            -ExitCodeMode AllDiagnostics

      - name: Run Pester
        shell: pwsh
        run: |
          $resultPath = Join-Path $PWD 'artifacts\validation\pester-results.xml'
          New-Item -ItemType Directory -Force -Path (Split-Path -Path $resultPath -Parent) | Out-Null
          $config = New-PesterConfiguration
          $config.Run.Path = '.\tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = $resultPath
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Run trusted WhatIf smoke checks
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File '.\PowerShell Script\V7\Printer\Restart.Spool.DeletePrinterQSimple.ps1' -WhatIf
          pwsh -NoProfile -ExecutionPolicy Bypass -File '.\PowerShell Script\V7\windows-maintenance\Reset.Network.RebootPC.ps1' -WhatIf
          & "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -ExecutionPolicy Bypass -File '.\PowerShell Script\V5\Printer\Restart.Spool.DeletePrinterQSimple.ps1' -WhatIf
          & "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -ExecutionPolicy Bypass -File '.\PowerShell Script\V5\windows-maintenance\Nettoyage.Avance.Windows.Sauf.logserreur.ps1' -WhatIf

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: powershell-validation
          path: artifacts/validation/
          if-no-files-found: ignore
